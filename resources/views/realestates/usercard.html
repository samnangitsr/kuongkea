<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ID Card Generator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<style>
    body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  padding: 20px;
  flex-wrap: wrap;
}

.container {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

form {
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  max-width: 300px;
  width: 100%;
}

form h2 {
  margin-bottom: 10px;
  font-size: 20px;
}

form input {
  display: block;
  margin: 10px 0;
  padding: 10px;
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 4px;
}

form button {
  padding: 10px;
  width: 100%;
  background: #003366;
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.id-card {
  width: 280px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
  padding-bottom: 15px;
}

.header {
  background: #003366;
  color: white;
  padding: 10px 0;
  border-top-left-radius: 8px;
  border-top-right-radius: 8px;
  position: relative;
}

.logo {
  width: 30px;
  position: absolute;
  left: 10px;
  top: 10px;
}

.photo img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-top: -40px;
  border: 4px solid white;
}

.role {
  background: #f5c542;
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 14px;
}

.details {
  text-align: left;
  padding: 10px 20px;
  font-size: 14px;
}

.barcode img {
  margin-top: 10px;
  width: 80%;
}

</style>
<body>
  <div class="container">
    <form id="idForm">
      <h2>Create Your ID Card</h2>
      <input type="text" placeholder="Full Name" name="name" required />
      <input type="text" placeholder="Role (e.g. Manager)" name="role" required />
      <input type="text" placeholder="ID Number" name="id" required />
      <input type="email" placeholder="Email" name="email" required />
      <input type="tel" placeholder="Phone Number" name="phone" required />
      <button type="submit">Generate Card</button>
    </form>

    <div class="id-card">
      <div class="header">
        <img src="https://via.placeholder.com/50" alt="Logo" class="logo">
        <h1>SALFORD & CO.</h1>
      </div>
      <div class="photo">
        <img src="https://via.placeholder.com/100" alt="User Photo" id="userPhoto">
      </div>
      <h2 id="cardName">Morgan Maxwell</h2>
      <div class="role" id="cardRole">Manager</div>
      <div class="details">
        <p><strong>ID No:</strong> <span id="cardID">1234567890</span></p>
        <p><strong>Email:</strong> <span id="cardEmail">hello@reallygreatsite.com</span></p>
        <p><strong>Phone:</strong> <span id="cardPhone">+123-456-7890</span></p>
      </div>
      <div class="barcode">
        <img src="https://barcode.tec-it.com/barcode.ashx?data=1234567890&code=Code128" alt="Barcode" id="barcodeImage">
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('idForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name = form.name.value;
      const role = form.role.value;
      const id = form.id.value;
      const email = form.email.value;
      const phone = form.phone.value;

      document.getElementById('cardName').innerText = name;
      document.getElementById('cardRole').innerText = role;
      document.getElementById('cardID').innerText = id;
      document.getElementById('cardEmail').innerText = email;
      document.getElementById('cardPhone').innerText = phone;
      document.getElementById('barcodeImage').src = `https://barcode.tec-it.com/barcode.ashx?data=${id}&code=Code128`;
    });
  </script>
</body>
</html>
