name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, bcmath, gd, intl, zip, curl, xml, fileinfo, openssl
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --no-check-publish

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php83-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php83-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: PHP syntax check (php -l on app/, config/, database/, routes/, tests/)
        run: |
          find app config database routes tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /tmp/phplint.log 2>&1 \
            || (cat /tmp/phplint.log && exit 1)
          grep -v 'No syntax errors detected' /tmp/phplint.log || true

      - name: Validate Blade templates compile (view:cache)
        run: php artisan view:cache

      - name: Validate routes register (route:cache)
        run: php artisan route:cache

      - name: Validate config loads (config:cache)
        run: php artisan config:cache

      - name: Run unit tests
        run: php artisan test --testsuite=Unit
